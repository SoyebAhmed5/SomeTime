{% extends "auth.html" %}
{% block title %}Comments{% endblock %} 
{% block forms %}

<h1 class="text-center">Comments</h1>

<div class="card p-3">
    {% include 'messages.html' %}

    {% for p in post %}
        <h5 class="text-black">{{ p.comment }}</h5>
        <p class="text-black">Commented By: {{ p.commentedBy }}</p>
        <p class="text-black">Commented On: {{ p.commentedOn }}</p>
        <hr>
    {% endfor %}
</div>

{% endblock forms %}
